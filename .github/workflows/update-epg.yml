name: Update EPG

on:
  schedule:
    - cron: '15 * * * *'   # hourly so PPV channel name rotations flow through
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-epg.yml'

permissions:
  contents: write

concurrency:
  group: update-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 13 iptv-org/epg grabs + build can run long
    env:
      M3U_URL_1: ${{ secrets.M3U_URL_1 }}
      M3U_URL_2: ${{ secrets.M3U_URL_2 }}
      PROVIDER_EPG_URL_1: ${{ secrets.PROVIDER_EPG_URL_1 }}
      PROVIDER_EPG_URL_2: ${{ secrets.PROVIDER_EPG_URL_2 }}
      XTREAM_HOST_2: ${{ secrets.XTREAM_HOST_2 }}
      XTREAM_USER_2: ${{ secrets.XTREAM_USER_2 }}
      XTREAM_PASS_2: ${{ secrets.XTREAM_PASS_2 }}
      BEIN_EPG_URL: https://al7omed.github.io/bein-epg/guide.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install --quiet qrcode

      - name: Fetch sub1 M3U (direct)
        run: |
          mkdir -p epg-work
          curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
            "$M3U_URL_1" -o epg-work/m3u_sub1.m3u
          echo "sub1: $(grep -c '^#EXTINF' epg-work/m3u_sub1.m3u) channels"

      - name: Fetch sub2 M3U (best-effort, soft-fails on CF block)
        continue-on-error: true
        run: |
          set +e
          ok=0
          if curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
              "$M3U_URL_2" -o epg-work/m3u_sub2.m3u; then
            echo "sub2 direct OK"
            ok=1
          else
            echo "sub2 direct returned non-2xx; trying Xtream API..."
            if XTREAM_HOST="$XTREAM_HOST_2" XTREAM_USER="$XTREAM_USER_2" XTREAM_PASS="$XTREAM_PASS_2" \
               python3 scripts/synth_m3u_from_xtream.py > epg-work/m3u_sub2.m3u 2> /tmp/synth.err; then
              echo "sub2 synth OK"
              ok=1
            else
              echo "sub2 synth failed:"
              cat /tmp/synth.err
              echo "#EXTM3U" > epg-work/m3u_sub2.m3u
              echo "::warning::sub2 M3U could not be fetched; build continues with sub1 only"
            fi
          fi
          if [ "$ok" = "1" ]; then
            echo "sub2: $(grep -c '^#EXTINF' epg-work/m3u_sub2.m3u) channels"
          fi
          exit 0

      - name: Fetch live beIN TV-guide from bein.com (with LIVE flags)
        continue-on-error: true
        run: |
          set +e
          # Direct scrape of bein.com/en/tv-guide — captures the LIVE badge
          # bein.com puts on currently-airing broadcasts. Higher priority
          # than al7omed/bein-epg (every-12h) because this runs each build.
          if python3 scripts/fetch_bein_live.py -o epg-work/bein-live.xml -d 5 2> /tmp/bein-live.err; then
            echo "bein-live: $(stat -c '%s' epg-work/bein-live.xml) bytes"
            head -1 /tmp/bein-live.err
            tail -5 /tmp/bein-live.err
          else
            echo "::warning::fetch_bein_live failed; build continues with bein-epg.github.io fallback"
            cat /tmp/bein-live.err
            echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv></tv>" > epg-work/bein-live.xml
          fi
          exit 0

      - name: Setup Node (for iptv-org/epg scrapers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Checkout iptv-org/epg (multi-source scraper)
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          ref: master
          path: epg-tool

      - name: Install iptv-org/epg deps
        working-directory: epg-tool
        run: npm ci

      - name: Grab UK/US/MENA EPG sources (iptv-org/epg, parallelized)
        continue-on-error: true
        working-directory: epg-tool
        run: |
          set +e
          mkdir -p ../epg-work/iptv-org
          # Sites we pull from. Each becomes a separate XMLTV file fed into
          # PROVIDER_EPG_URL below. Run 4 grabs in parallel via xargs -P 4
          # so the slowest ones (tvtv.us, tvpassport.com, etc.) don't bottleneck
          # the build serially. Each capped at 240s.
          SITES=(
            # UK
            sky.com             # UK Sky channels (Cinema/Sports) — fast
            mytelly.co.uk       # UK alternate guide — fast
            tv24.co.uk          # UK alternate guide — fast
            # US
            directv.com         # US DirecTV native — fast
            ontvtonight.com     # Multi-region guide — fast
            # Sports specifics
            nhl.com             # NHL games
            # MENA
            shahid.mbc.net      # MBC Shahid
            osn.com             # OSN
            rotana.net          # Rotana
            aljazeera.com       # Al Jazeera news
            # NOTE: tvtv.us is HTTP-403-banned, tvpassport.com has 96k
            # channels (uncrabbable in CI), freeview.co.uk has 1760
            # channel-regions and times out partway through. Dropped here
            # — sky.com covers most UK channels we care about.
          )
          grab_one() {
            local site="$1"
            local channels_file
            channels_file=$(ls sites/$site/*.channels.xml 2>/dev/null | head -1)
            if [ -z "$channels_file" ]; then
              echo "::warning::No channels.xml for $site"
              return 0
            fi
            local out="../epg-work/iptv-org/${site}.xml"
            timeout 240 npm run grab --- \
              --channels="$channels_file" \
              --output="$out" \
              --days=5 \
              --maxConnections=3 \
              --timeout=15000 >"/tmp/grab-${site}.log" 2>&1
            if [ -s "$out" ]; then
              local progs
              progs=$(grep -c '<programme' "$out" 2>/dev/null || echo 0)
              echo "OK  $site: $(stat -c '%s' "$out") bytes, $progs programmes"
            else
              echo "FAIL $site: empty/missing — last log lines:"
              tail -3 "/tmp/grab-${site}.log" 2>/dev/null || true
            fi
          }
          export -f grab_one
          # P=2: 4 concurrent caused freeview.co.uk / tv24.co.uk / tvtv.us /
          # tvpassport.com to fail (npm/iptv-org/epg resource contention or
          # upstream rate-limit). 2 concurrent is the sweet spot — total
          # build time still ≤ 25 min for all 13 sites.
          printf '%s\n' "${SITES[@]}" | xargs -P 2 -I {} bash -c 'grab_one "$@"' _ {}
          echo "--- final iptv-org sources ---"
          ls -la ../epg-work/iptv-org/ 2>/dev/null || true
          exit 0

      - name: Compose PROVIDER_EPG_URL (only existing files)
        id: provider_urls
        run: |
          set -euo pipefail
          # Build the comma-separated provider URL list, skipping any
          # iptv-org/epg grab that failed (empty/missing XML file). Order:
          #   1. bein-live (direct bein.com scrape, has LIVE flags)
          #   2. bein-epg (al7omed/bein-epg github artifact)
          #   3. iptv-org/epg outputs that exist on disk
          #   4. provider sub1, sub2
          urls=()
          urls+=("file://${GITHUB_WORKSPACE}/epg-work/bein-live.xml")
          urls+=("${BEIN_EPG_URL}")
          for f in epg-work/iptv-org/*.xml; do
            [ -s "$f" ] && urls+=("file://${GITHUB_WORKSPACE}/${f}")
          done
          # Provider 1 + 2 (CSV)
          if [ -n "${PROVIDER_EPG_URL_1:-}" ]; then urls+=("${PROVIDER_EPG_URL_1}"); fi
          if [ -n "${PROVIDER_EPG_URL_2:-}" ]; then urls+=("${PROVIDER_EPG_URL_2}"); fi
          # Join with commas
          IFS=','; joined="${urls[*]}"
          echo "Final PROVIDER_EPG_URL has $(echo "$joined" | tr ',' '\n' | wc -l) sources"
          echo "url=$joined" >> "$GITHUB_OUTPUT"

      - name: Build EPG
        env:
          M3U_URL: file://${{ github.workspace }}/epg-work/m3u_sub1.m3u,file://${{ github.workspace }}/epg-work/m3u_sub2.m3u
          PROVIDER_EPG_URL: ${{ steps.provider_urls.outputs.url }}
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: python3 scripts/build_epg.py

      - name: Stats
        run: |
          echo "guide.xml.gz:   $(stat -c '%s' docs/guide.xml.gz) bytes"
          echo "tvg-id-map.tsv: $(stat -c '%s' docs/tvg-id-map.tsv) bytes"

      - name: Ensure stale files stay purged
        run: |
          rm -f docs/playlist.m3u docs/guide.xml

      - name: Commit and push
        env:
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml.gz docs/tvg-id-map.tsv
          # EPG lite + region-specific EPG splits (smaller, faster for
          # players; advanced users can mix multiple sub-playlists).
          for f in docs/guide-lite.xml.gz docs/guide-bein.xml.gz \
                   docs/guide-sports.xml.gz docs/guide-ar.xml.gz \
                   docs/guide-uk.xml.gz docs/guide-us.xml.gz \
                   docs/now-playing.json; do
            [ -f "$f" ] && git add "$f"
          done
          # Add the patched M3U folder (playlist.m3u + favorites.m3u +
          # failover.json + setup.json + README.txt + playlist-qr.svg).
          if [ -n "$M3U_PATH_TOKEN" ] && [ -d "docs/$M3U_PATH_TOKEN" ]; then
            git add "docs/$M3U_PATH_TOKEN"
          fi
          # Append-only channel-rename log (history of provider renames).
          if [ -f channels/name_changes.log ]; then
            git add channels/name_changes.log
          fi
          git rm --cached --ignore-unmatch docs/guide.xml docs/playlist.m3u >/dev/null 2>&1 || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update unified EPG + M3U $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
