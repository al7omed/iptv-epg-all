name: Update EPG

on:
  schedule:
    - cron: '15 * * * *'   # hourly so PPV channel name rotations flow through
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-epg.yml'

permissions:
  contents: write

concurrency:
  group: update-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      M3U_URL_1: ${{ secrets.M3U_URL_1 }}
      M3U_URL_2: ${{ secrets.M3U_URL_2 }}
      PROVIDER_EPG_URL_1: ${{ secrets.PROVIDER_EPG_URL_1 }}
      PROVIDER_EPG_URL_2: ${{ secrets.PROVIDER_EPG_URL_2 }}
      XTREAM_HOST_2: ${{ secrets.XTREAM_HOST_2 }}
      XTREAM_USER_2: ${{ secrets.XTREAM_USER_2 }}
      XTREAM_PASS_2: ${{ secrets.XTREAM_PASS_2 }}
      BEIN_EPG_URL: https://al7omed.github.io/bein-epg/guide.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install --quiet qrcode

      - name: Fetch sub1 M3U (direct)
        run: |
          mkdir -p epg-work
          curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
            "$M3U_URL_1" -o epg-work/m3u_sub1.m3u
          echo "sub1: $(grep -c '^#EXTINF' epg-work/m3u_sub1.m3u) channels"

      - name: Fetch sub2 M3U (best-effort, soft-fails on CF block)
        continue-on-error: true
        run: |
          set +e
          ok=0
          if curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
              "$M3U_URL_2" -o epg-work/m3u_sub2.m3u; then
            echo "sub2 direct OK"
            ok=1
          else
            echo "sub2 direct returned non-2xx; trying Xtream API..."
            if XTREAM_HOST="$XTREAM_HOST_2" XTREAM_USER="$XTREAM_USER_2" XTREAM_PASS="$XTREAM_PASS_2" \
               python3 scripts/synth_m3u_from_xtream.py > epg-work/m3u_sub2.m3u 2> /tmp/synth.err; then
              echo "sub2 synth OK"
              ok=1
            else
              echo "sub2 synth failed:"
              cat /tmp/synth.err
              echo "#EXTM3U" > epg-work/m3u_sub2.m3u
              echo "::warning::sub2 M3U could not be fetched; build continues with sub1 only"
            fi
          fi
          if [ "$ok" = "1" ]; then
            echo "sub2: $(grep -c '^#EXTINF' epg-work/m3u_sub2.m3u) channels"
          fi
          exit 0

      - name: Build EPG
        env:
          M3U_URL: file://${{ github.workspace }}/epg-work/m3u_sub1.m3u,file://${{ github.workspace }}/epg-work/m3u_sub2.m3u
          # Order matters: bein-epg first (highest fidelity for beIN MENA),
          # then provider EPGs. First wins on (channel,start) collisions.
          PROVIDER_EPG_URL: ${{ env.BEIN_EPG_URL }},${{ secrets.PROVIDER_EPG_URL_1 }},${{ secrets.PROVIDER_EPG_URL_2 }}
          # When set, build also emits a patched M3U at docs/<token>/playlist.m3u
          # The token is the access key — anyone with the URL can use the
          # subscription. Keep the URL private.
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: python3 scripts/build_epg.py

      - name: Stats
        run: |
          echo "guide.xml.gz:   $(stat -c '%s' docs/guide.xml.gz) bytes"
          echo "tvg-id-map.tsv: $(stat -c '%s' docs/tvg-id-map.tsv) bytes"

      - name: Ensure stale files stay purged
        run: |
          rm -f docs/playlist.m3u docs/guide.xml

      - name: Commit and push
        env:
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml.gz docs/tvg-id-map.tsv
          # EPG lite + region-specific EPG splits (smaller, faster for
          # players; advanced users can mix multiple sub-playlists).
          for f in docs/guide-lite.xml.gz docs/guide-bein.xml.gz \
                   docs/guide-sports.xml.gz docs/guide-ar.xml.gz \
                   docs/guide-uk.xml.gz docs/guide-us.xml.gz; do
            [ -f "$f" ] && git add "$f"
          done
          # Add the patched M3U folder (playlist.m3u + favorites.m3u +
          # failover.json + setup.json + README.txt + playlist-qr.svg).
          if [ -n "$M3U_PATH_TOKEN" ] && [ -d "docs/$M3U_PATH_TOKEN" ]; then
            git add "docs/$M3U_PATH_TOKEN"
          fi
          # Append-only channel-rename log (history of provider renames).
          if [ -f channels/name_changes.log ]; then
            git add channels/name_changes.log
          fi
          git rm --cached --ignore-unmatch docs/guide.xml docs/playlist.m3u >/dev/null 2>&1 || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update unified EPG + M3U $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
