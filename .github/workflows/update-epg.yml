name: Update EPG

on:
  schedule:
    - cron: '15 * * * *'   # hourly so PPV channel name rotations flow through
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/update-epg.yml'

permissions:
  contents: write

concurrency:
  group: update-epg
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # 13 iptv-org/epg grabs + build can run long
    env:
      M3U_URL_1: ${{ secrets.M3U_URL_1 }}
      M3U_URL_2: ${{ secrets.M3U_URL_2 }}
      PROVIDER_EPG_URL_1: ${{ secrets.PROVIDER_EPG_URL_1 }}
      PROVIDER_EPG_URL_2: ${{ secrets.PROVIDER_EPG_URL_2 }}
      XTREAM_HOST_2: ${{ secrets.XTREAM_HOST_2 }}
      XTREAM_USER_2: ${{ secrets.XTREAM_USER_2 }}
      XTREAM_PASS_2: ${{ secrets.XTREAM_PASS_2 }}
      BEIN_EPG_URL: https://al7omed.github.io/bein-epg/guide.xml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install --quiet qrcode

      - name: Fetch sub1 M3U (direct)
        run: |
          mkdir -p epg-work
          curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
            "$M3U_URL_1" -o epg-work/m3u_sub1.m3u
          echo "sub1: $(grep -c '^#EXTINF' epg-work/m3u_sub1.m3u) channels"

      - name: Fetch sub2 M3U (best-effort, soft-fails on CF block)
        continue-on-error: true
        run: |
          set +e
          ok=0
          if curl -fsSL --max-time 90 -A "VLC/3.0.18 LibVLC/3.0.18" \
              "$M3U_URL_2" -o epg-work/m3u_sub2.m3u; then
            echo "sub2 direct OK"
            ok=1
          else
            echo "sub2 direct returned non-2xx; trying Xtream API..."
            if XTREAM_HOST="$XTREAM_HOST_2" XTREAM_USER="$XTREAM_USER_2" XTREAM_PASS="$XTREAM_PASS_2" \
               python3 scripts/synth_m3u_from_xtream.py > epg-work/m3u_sub2.m3u 2> /tmp/synth.err; then
              echo "sub2 synth OK"
              ok=1
            else
              echo "sub2 synth failed:"
              cat /tmp/synth.err
              echo "#EXTM3U" > epg-work/m3u_sub2.m3u
              echo "::warning::sub2 M3U could not be fetched; build continues with sub1 only"
            fi
          fi
          if [ "$ok" = "1" ]; then
            echo "sub2: $(grep -c '^#EXTINF' epg-work/m3u_sub2.m3u) channels"
          fi
          exit 0

      - name: Fetch live beIN TV-guide from bein.com (with LIVE flags)
        continue-on-error: true
        run: |
          set +e
          # Direct scrape of bein.com/en/tv-guide — captures the LIVE badge
          # bein.com puts on currently-airing broadcasts. Higher priority
          # than al7omed/bein-epg (every-12h) because this runs each build.
          if python3 scripts/fetch_bein_live.py -o epg-work/bein-live.xml -d 5 2> /tmp/bein-live.err; then
            echo "bein-live: $(stat -c '%s' epg-work/bein-live.xml) bytes"
            head -1 /tmp/bein-live.err
            tail -5 /tmp/bein-live.err
          else
            echo "::warning::fetch_bein_live failed; build continues with bein-epg.github.io fallback"
            cat /tmp/bein-live.err
            echo "<?xml version=\"1.0\" encoding=\"UTF-8\"?><tv></tv>" > epg-work/bein-live.xml
          fi
          exit 0

      - name: Checkout iptv-org/epg (multi-source scraper)
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          ref: master
          path: epg-tool
          fetch-depth: 1   # shallow clone — saves ~1GB / build

      - name: Setup Node (for iptv-org/epg scrapers)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'    # cache node_modules across builds — saves 5-10 min/build
          cache-dependency-path: 'epg-tool/package-lock.json'

      - name: Install iptv-org/epg deps
        working-directory: epg-tool
        run: npm ci

      - name: Curate iptv-org/epg channels.xml for big-tail sites
        continue-on-error: true
        run: |
          set +e
          # freeview.co.uk (1.7k), tvtv.us (2.3k), tvpassport.com (19k)
          # default channels.xml files are too big to grab in CI's 240s
          # per-site budget. Filter them down to ~300 channels each that
          # actually appear in our M3U using the same name-matching
          # primitives as the build (norm-name + token-set subset).
          for site in freeview.co.uk tvtv.us tvpassport.com; do
            src="epg-tool/sites/$site/$site.channels.xml"
            if [ ! -f "$src" ]; then
              echo "::warning::no $src to curate"
              continue
            fi
            cp "$src" "$src.full"  # keep original for diagnostics
            python3 scripts/curate_iptv_org_channels.py \
              --m3u epg-work/m3u_sub1.m3u \
              --m3u epg-work/m3u_sub2.m3u \
              --src "$src.full" \
              --out "$src" \
              --max-channels 300 2>&1 | sed "s/^/  $site: /"
          done

      - name: Grab UK/US/MENA EPG sources (iptv-org/epg, parallelized)
        continue-on-error: true
        working-directory: epg-tool
        run: |
          set +e
          mkdir -p ../epg-work/iptv-org
          # Sites we pull from. Each becomes a separate XMLTV file fed into
          # PROVIDER_EPG_URL below. Run 4 grabs in parallel via xargs -P 4
          # so the slowest ones don't bottleneck the build serially. Each
          # capped at 240s.
          SITES=(
            # UK
            sky.com             # UK Sky channels (Cinema/Sports) — fast
            mytelly.co.uk       # UK alternate guide — fast
            tv24.co.uk          # UK alternate guide — fast
            freeview.co.uk      # UK Freeview (curated)
            # US
            directv.com         # US DirecTV native — fast
            ontvtonight.com     # Multi-region guide — fast
            tvtv.us             # US Spectrum/cable guide (curated)
            tvpassport.com      # US broad guide (curated)
            # Sports specifics
            nhl.com             # NHL games
            # MENA
            shahid.mbc.net      # MBC Shahid
            osn.com             # OSN
            rotana.net          # Rotana
            aljazeera.com       # Al Jazeera news
            # NOTE: freeview.co.uk / tvtv.us / tvpassport.com are re-enabled
            # because the "Curate iptv-org/epg channels.xml" step above
            # trims their channels.xml to ~300 entries matched against our
            # M3U, so each grab now fits inside the 240s budget.
          )
          grab_one() {
            local site="$1"
            local channels_file
            channels_file=$(ls sites/$site/*.channels.xml 2>/dev/null | head -1)
            if [ -z "$channels_file" ]; then
              echo "::warning::No channels.xml for $site"
              return 0
            fi
            local out="../epg-work/iptv-org/${site}.xml"
            timeout 240 npm run grab --- \
              --channels="$channels_file" \
              --output="$out" \
              --days=5 \
              --maxConnections=3 \
              --timeout=15000 >"/tmp/grab-${site}.log" 2>&1
            if [ -s "$out" ]; then
              local progs
              progs=$(grep -c '<programme' "$out" 2>/dev/null || echo 0)
              echo "OK  $site: $(stat -c '%s' "$out") bytes, $progs programmes"
            else
              echo "FAIL $site: empty/missing — last log lines:"
              tail -3 "/tmp/grab-${site}.log" 2>/dev/null || true
            fi
          }
          export -f grab_one
          # P=2: 4 concurrent caused freeview.co.uk / tv24.co.uk / tvtv.us /
          # tvpassport.com to fail (npm/iptv-org/epg resource contention or
          # upstream rate-limit). 2 concurrent is the sweet spot — total
          # build time still ≤ 25 min for all 13 sites.
          printf '%s\n' "${SITES[@]}" | xargs -P 2 -I {} bash -c 'grab_one "$@"' _ {}
          echo "--- final iptv-org sources ---"
          ls -la ../epg-work/iptv-org/ 2>/dev/null || true
          # Threshold check: fail the step if too many grabs failed.
          # iptv-org/epg sites often have transient 4xx/5xx — we tolerate
          # up to 4 misses out of the configured count.
          SURVIVED=$(ls -1 ../epg-work/iptv-org/*.xml 2>/dev/null | xargs -I {} bash -c '[ -s "{}" ] && echo "{}"' | wc -l)
          TOTAL=${#SITES[@]}
          MIN_REQUIRED=$((TOTAL - 4))
          if [ "$MIN_REQUIRED" -lt 6 ]; then MIN_REQUIRED=6; fi
          echo "iptv-org grab survivors: $SURVIVED / $TOTAL  (min required: $MIN_REQUIRED)"
          if [ "$SURVIVED" -lt "$MIN_REQUIRED" ]; then
            echo "::error::Too few iptv-org/epg grabs succeeded ($SURVIVED < $MIN_REQUIRED) — aborting"
            exit 1
          fi
          exit 0

      - name: Compose PROVIDER_EPG_URL (only existing files)
        id: provider_urls
        run: |
          set -euo pipefail
          # Build the comma-separated provider URL list, skipping any
          # iptv-org/epg grab that failed (empty/missing XML file). Order:
          #   1. bein-live (direct bein.com scrape, has LIVE flags)
          #   2. bein-epg (al7omed/bein-epg github artifact)
          #   3. iptv-org/epg outputs that exist on disk
          #   4. provider sub1, sub2
          urls=()
          urls+=("file://${GITHUB_WORKSPACE}/epg-work/bein-live.xml")
          urls+=("${BEIN_EPG_URL}")
          for f in epg-work/iptv-org/*.xml; do
            [ -s "$f" ] && urls+=("file://${GITHUB_WORKSPACE}/${f}")
          done
          # Provider 1 + 2 (CSV)
          if [ -n "${PROVIDER_EPG_URL_1:-}" ]; then urls+=("${PROVIDER_EPG_URL_1}"); fi
          if [ -n "${PROVIDER_EPG_URL_2:-}" ]; then urls+=("${PROVIDER_EPG_URL_2}"); fi
          # Join with commas
          IFS=','; joined="${urls[*]}"
          echo "Final PROVIDER_EPG_URL has $(echo "$joined" | tr ',' '\n' | wc -l) sources"
          echo "url=$joined" >> "$GITHUB_OUTPUT"

      - name: Build EPG
        env:
          M3U_URL: file://${{ github.workspace }}/epg-work/m3u_sub1.m3u,file://${{ github.workspace }}/epg-work/m3u_sub2.m3u
          PROVIDER_EPG_URL: ${{ steps.provider_urls.outputs.url }}
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: python3 scripts/build_epg.py

      - name: Stats + smoke test
        run: |
          echo "guide.xml.gz:   $(stat -c '%s' docs/guide.xml.gz) bytes"
          echo "guide-lite.xml.gz: $(stat -c '%s' docs/guide-lite.xml.gz) bytes"
          echo "tvg-id-map.tsv: $(stat -c '%s' docs/tvg-id-map.tsv) bytes"
          # Smoke-test the artifacts so a corrupted build fails CI instead
          # of shipping a broken EPG.
          FULL_PROGS=$(gunzip -c docs/guide.xml.gz | grep -c '<programme' || true)
          LITE_PROGS=$(gunzip -c docs/guide-lite.xml.gz | grep -c '<programme' || true)
          echo "guide.xml.gz programmes: $FULL_PROGS"
          echo "guide-lite.xml.gz programmes: $LITE_PROGS"
          if [ "$FULL_PROGS" -lt 50000 ] || [ "$LITE_PROGS" -lt 10000 ]; then
            echo "::error::Suspiciously low programme counts (full=$FULL_PROGS lite=$LITE_PROGS)"
            exit 1
          fi

      - name: Ensure stale files stay purged
        run: |
          # Files that used to be published but were dropped — delete from
          # docs/ so the next push removes them from Pages.
          rm -f docs/playlist.m3u docs/guide.xml \
                docs/now-playing.json \
                docs/guide-bein.xml.gz docs/guide-sports.xml.gz \
                docs/guide-ar.xml.gz docs/guide-uk.xml.gz docs/guide-us.xml.gz

      - name: Commit and push
        env:
          M3U_PATH_TOKEN: ${{ secrets.M3U_PATH_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/guide.xml.gz docs/guide-lite.xml.gz docs/tvg-id-map.tsv
          # Stage deletes for any deprecated files (region splits +
          # now-playing.json — replaced by lite EPG's 24h window with
          # 🔴 LIVE markers).
          for f in docs/now-playing.json docs/guide-bein.xml.gz \
                   docs/guide-sports.xml.gz docs/guide-ar.xml.gz \
                   docs/guide-uk.xml.gz docs/guide-us.xml.gz; do
            git rm --cached --ignore-unmatch "$f" >/dev/null 2>&1 || true
          done
          # Add the patched M3U folder (playlist.m3u + favorites.m3u +
          # failover.json + setup.json + README.txt + playlist-qr.svg).
          if [ -n "$M3U_PATH_TOKEN" ] && [ -d "docs/$M3U_PATH_TOKEN" ]; then
            git add "docs/$M3U_PATH_TOKEN"
          fi
          # Append-only channel-rename log (history of provider renames).
          if [ -f channels/name_changes.log ]; then
            git add channels/name_changes.log
          fi
          git rm --cached --ignore-unmatch docs/guide.xml docs/playlist.m3u >/dev/null 2>&1 || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # Stash the staged changes so we can re-apply them after a soft
            # reset (used by the retry loop on push rejection).
            STASH_LIST="$(mktemp)"
            git diff --staged --name-only > "$STASH_LIST"
            git commit -m "Update unified EPG + M3U $(date -u +%Y-%m-%dT%H:%MZ)"
            # Retry-with-reset-soft loop. On push rejection:
            #   1. Save the commit message
            #   2. Fetch latest remote main
            #   3. Soft-reset to remote main (working-tree files preserved)
            #   4. Re-stage all the same paths
            #   5. Recommit (now on top of fresh remote)
            #   6. Retry push
            # Never merges, never hits binary-file conflicts.
            COMMIT_MSG="Update unified EPG + M3U $(date -u +%Y-%m-%dT%H:%MZ)"
            for attempt in 1 2 3 4 5; do
              if git push; then
                echo "push OK (attempt $attempt)"; break
              fi
              echo "push rejected (attempt $attempt) — soft-resetting onto remote main..."
              git fetch origin main || { echo "fetch failed"; exit 1; }
              git reset --soft origin/main
              # Re-stage everything that was in the original commit
              while IFS= read -r path; do
                if [ -e "$path" ]; then
                  git add -- "$path"
                else
                  git rm --cached --ignore-unmatch -- "$path" >/dev/null 2>&1 || true
                fi
              done < "$STASH_LIST"
              if git diff --staged --quiet; then
                echo "no diff vs new remote — nothing to push"; break
              fi
              git commit -m "$COMMIT_MSG"
              sleep 5
            done
            rm -f "$STASH_LIST"
          fi
